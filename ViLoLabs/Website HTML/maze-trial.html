<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trace the Path — Bee to Flower Garden</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#1a1a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui,sans-serif;padding:2rem}
  h1{color:#C8963C;font-size:1rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1rem;font-weight:700}
  .card{background:#fff;border-radius:16px;padding:1rem;box-shadow:0 8px 40px rgba(0,0,0,.5);max-width:500px;width:100%}
  svg{display:block;width:100%;border-radius:12px}
</style>
</head>
<body>
<h1>Trace the Path — Page 25</h1>
<div class="card">
<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5BC8F5"/>
      <stop offset="100%" stop-color="#A8DFF5"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6DCF3E"/>
      <stop offset="100%" stop-color="#4AAD1E"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="400" height="500" fill="url(#sky)"/>

  <!-- Clouds top-left -->
  <g opacity=".95">
    <ellipse cx="60" cy="38" rx="40" ry="21" fill="#fff"/>
    <ellipse cx="84" cy="30" rx="30" ry="20" fill="#fff"/>
    <ellipse cx="34" cy="35" rx="24" ry="16" fill="#fff"/>
  </g>

  <!-- Sun top-right -->
  <g transform="translate(356,52)">
    <circle cx="0" cy="0" r="28" fill="#FFE135"/>
    <circle cx="0" cy="0" r="21" fill="#FFD700"/>
    <line x1="0" y1="-34" x2="0" y2="-42" stroke="#FFD700" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="24" y1="-24" x2="29" y2="-29" stroke="#FFD700" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="34" y1="0" x2="42" y2="0" stroke="#FFD700" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="24" y1="24" x2="29" y2="29" stroke="#FFD700" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="0" y1="34" x2="0" y2="42" stroke="#FFD700" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-24" y1="24" x2="-29" y2="29" stroke="#FFD700" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-34" y1="0" x2="-42" y2="0" stroke="#FFD700" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-24" y1="-24" x2="-29" y2="-29" stroke="#FFD700" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Pink cloud title -->
  <g transform="translate(200,68)">
    <ellipse cx="-52" cy="2" rx="46" ry="27" fill="#F4537A"/>
    <ellipse cx="0" cy="-10" rx="54" ry="30" fill="#F4537A"/>
    <ellipse cx="52" cy="2" rx="46" ry="27" fill="#F4537A"/>
    <ellipse cx="-28" cy="14" rx="40" ry="22" fill="#F4537A"/>
    <ellipse cx="28" cy="14" rx="40" ry="22" fill="#F4537A"/>
    <text x="1" y="9" text-anchor="middle" font-size="20" fill="#fff" font-family="Georgia,serif" font-weight="900">Trace the Path</text>
  </g>

  <!-- ── CLEAN ANGULAR PATH — no overlaps, 7 turns ── -->
  <!-- Shadow -->
  <polyline
    points="36,155  220,155  220,220  60,220  60,290  180,290  180,355  36,355  36,420  260,420  260,465"
    fill="none" stroke="rgba(0,0,0,0.13)" stroke-width="46"
    stroke-linecap="round" stroke-linejoin="round" transform="translate(4,5)"/>
  <!-- White path -->
  <polyline
    points="36,155  220,155  220,220  60,220  60,290  180,290  180,355  36,355  36,420  260,420  260,465"
    fill="none" stroke="#fff" stroke-width="44"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Grass -->
  <ellipse cx="200" cy="450" rx="240" ry="42" fill="#6DCF3E"/>
  <rect x="0" y="458" width="400" height="42" fill="#4AAD1E"/>
  <ellipse cx="200" cy="458" rx="240" ry="18" fill="#5DC532"/>

  <!-- Flowers spread across bottom -->
  <g transform="translate(30,444)">
    <rect x="-3" y="-32" width="6" height="32" fill="#2E8B24" rx="3"/>
    <ellipse cx="-9" cy="-20" rx="8" ry="4" fill="#2E8B24" transform="rotate(-35,-9,-20)"/>
    <circle cx="0" cy="-46" r="15" fill="#E84040"/>
    <circle cx="0" cy="-57" r="12" fill="#F87171"/>
    <circle cx="-12" cy="-50" r="10" fill="#F87171"/>
    <circle cx="12" cy="-50" r="10" fill="#F87171"/>
    <circle cx="0" cy="-46" r="9" fill="#C42020"/>
  </g>
  <g transform="translate(85,448)">
    <rect x="-2" y="-24" width="4" height="24" fill="#2E8B24" rx="2"/>
    <circle cx="0" cy="-30" r="5.5" fill="#FCD34D"/>
    <circle cx="0" cy="-39" r="5" fill="#93C5FD"/><circle cx="7" cy="-35" r="5" fill="#93C5FD"/>
    <circle cx="7" cy="-25" r="5" fill="#93C5FD"/><circle cx="0" cy="-21" r="5" fill="#93C5FD"/>
    <circle cx="-7" cy="-25" r="5" fill="#93C5FD"/><circle cx="-7" cy="-35" r="5" fill="#93C5FD"/>
    <circle cx="0" cy="-30" r="5.5" fill="#FCD34D"/>
  </g>
  <g transform="translate(148,446)">
    <rect x="-2.5" y="-28" width="5" height="28" fill="#2E8B24" rx="2"/>
    <circle cx="0" cy="-35" r="6.5" fill="#FBBF24"/>
    <circle cx="0" cy="-45" r="6" fill="#F9A8D4"/><circle cx="8" cy="-41" r="6" fill="#F9A8D4"/>
    <circle cx="8" cy="-29" r="6" fill="#F9A8D4"/><circle cx="0" cy="-25" r="6" fill="#F9A8D4"/>
    <circle cx="-8" cy="-29" r="6" fill="#F9A8D4"/><circle cx="-8" cy="-41" r="6" fill="#F9A8D4"/>
    <circle cx="0" cy="-35" r="6.5" fill="#FBBF24"/>
  </g>
  <g transform="translate(210,449)">
    <rect x="-2" y="-22" width="4" height="22" fill="#2E8B24" rx="2"/>
    <circle cx="0" cy="-28" r="5" fill="#FEF08A"/>
    <circle cx="0" cy="-36" r="4.5" fill="#fff"/><circle cx="6" cy="-33" r="4.5" fill="#fff"/>
    <circle cx="6" cy="-23" r="4.5" fill="#fff"/><circle cx="0" cy="-20" r="4.5" fill="#fff"/>
    <circle cx="-6" cy="-23" r="4.5" fill="#fff"/><circle cx="-6" cy="-33" r="4.5" fill="#fff"/>
    <circle cx="0" cy="-28" r="5" fill="#FEF08A"/>
  </g>
  <g transform="translate(272,447)">
    <rect x="-2.5" y="-28" width="5" height="28" fill="#2E8B24" rx="2"/>
    <ellipse cx="-7" cy="-18" rx="7" ry="3.5" fill="#2E8B24" transform="rotate(-40,-7,-18)"/>
    <ellipse cx="0" cy="-40" rx="9" ry="14" fill="#FB923C"/>
    <ellipse cx="-7" cy="-36" rx="7" ry="12" fill="#F97316"/>
    <ellipse cx="7" cy="-36" rx="7" ry="12" fill="#FDBA74"/>
  </g>
  <g transform="translate(326,448)">
    <rect x="-2" y="-22" width="4" height="22" fill="#2E8B24" rx="2"/>
    <circle cx="0" cy="-28" r="5" fill="#FCD34D"/>
    <circle cx="0" cy="-36" r="4.5" fill="#FBCFE8"/><circle cx="6" cy="-33" r="4.5" fill="#FBCFE8"/>
    <circle cx="6" cy="-23" r="4.5" fill="#FBCFE8"/><circle cx="0" cy="-20" r="4.5" fill="#FBCFE8"/>
    <circle cx="-6" cy="-23" r="4.5" fill="#FBCFE8"/><circle cx="-6" cy="-33" r="4.5" fill="#FBCFE8"/>
    <circle cx="0" cy="-28" r="5" fill="#FCD34D"/>
  </g>
  <g transform="translate(376,442)">
    <rect x="-2.5" y="-28" width="5" height="28" fill="#2E8B24" rx="2"/>
    <ellipse cx="0" cy="-42" rx="9" ry="14" fill="#DC2626"/>
    <ellipse cx="-7" cy="-38" rx="7" ry="12" fill="#B91C1C"/>
    <ellipse cx="7" cy="-38" rx="7" ry="12" fill="#F87171"/>
  </g>

  <!-- BEE — upper right, floating freely, no marker -->
  <g transform="translate(308,132)">
    <ellipse cx="-9" cy="-16" rx="13" ry="8" fill="#BAE6FD" opacity=".85" transform="rotate(-25,-9,-16)"/>
    <ellipse cx="9" cy="-15" rx="13" ry="8" fill="#BAE6FD" opacity=".85" transform="rotate(25,9,-15)"/>
    <ellipse cx="0" cy="0" rx="15" ry="12" fill="#1C1917"/>
    <rect x="-15" y="-6" width="30" height="7" fill="#FCD34D" rx="2.5" opacity=".9"/>
    <rect x="-13" y="3" width="26" height="6" fill="#FCD34D" rx="2.5" opacity=".8"/>
    <circle cx="-5" cy="-3" r="3.5" fill="#fff"/>
    <circle cx="5" cy="-3" r="3.5" fill="#fff"/>
    <circle cx="-4" cy="-3" r="1.8" fill="#1C1917"/>
    <circle cx="6" cy="-3" r="1.8" fill="#1C1917"/>
    <path d="M -3 4 Q 0 8 3 4" fill="none" stroke="#92400E" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-6" y1="-11" x2="-12" y2="-22" stroke="#1C1917" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="-13" cy="-23" r="3" fill="#1C1917"/>
    <line x1="6" y1="-11" x2="12" y2="-22" stroke="#1C1917" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="13" cy="-23" r="3" fill="#1C1917"/>
    <polygon points="15,2 23,0 15,-2" fill="#92400E"/>
  </g>
</svg>
</div>
</body>
</html>
