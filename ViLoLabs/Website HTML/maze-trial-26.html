<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trace the Path — Pterodactyl to Volcano</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#1a1a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui,sans-serif;padding:2rem}
  h1{color:#C8963C;font-size:1rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1rem;font-weight:700}
  .card{background:#fff;border-radius:16px;padding:1rem;box-shadow:0 8px 40px rgba(0,0,0,.5);max-width:500px;width:100%}
  svg{display:block;width:100%;border-radius:12px}
</style>
</head>
<body>
<h1>Trace the Path — Page 26 (Rebuilt)</h1>
<div class="card">
<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky26" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5ECFBE"/>
      <stop offset="100%" stop-color="#8EDED2"/>
    </linearGradient>
    <linearGradient id="hill26" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A8C840"/>
      <stop offset="100%" stop-color="#7A9E20"/>
    </linearGradient>
    <linearGradient id="hillBeige" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4C8A0"/>
      <stop offset="100%" stop-color="#B8A870"/>
    </linearGradient>
    <linearGradient id="volcBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A07850"/>
      <stop offset="100%" stop-color="#6B4C28"/>
    </linearGradient>
    <linearGradient id="lava" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="60%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="400" height="500" fill="url(#sky26)"/>

  <!-- Beige/sandy background hills -->
  <ellipse cx="130" cy="360" rx="160" ry="80" fill="url(#hillBeige)" opacity=".7"/>
  <ellipse cx="310" cy="370" rx="130" ry="70" fill="url(#hillBeige)" opacity=".6"/>

  <!-- Pink cloud title -->
  <g transform="translate(200,68)">
    <ellipse cx="-52" cy="2" rx="46" ry="27" fill="#F4537A"/>
    <ellipse cx="0" cy="-10" rx="54" ry="30" fill="#F4537A"/>
    <ellipse cx="52" cy="2" rx="46" ry="27" fill="#F4537A"/>
    <ellipse cx="-28" cy="14" rx="40" ry="22" fill="#F4537A"/>
    <ellipse cx="28" cy="14" rx="40" ry="22" fill="#F4537A"/>
    <text x="1" y="9" text-anchor="middle" font-size="20" fill="#fff" font-family="Georgia,serif" font-weight="900" letter-spacing=".5">Trace the Path</text>
  </g>

  <!-- ── DOUBLE-CHANNEL WINDING PATH ── -->
  <!-- Outer shadow -->
  <path d="M 68,148 C 68,210 68,240 130,260 C 192,280 200,220 200,180
           C 200,140 220,130 260,150 C 300,170 310,220 290,270
           C 270,320 220,330 200,370 C 185,400 230,420 290,440"
    fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="52"
    stroke-linecap="round" stroke-linejoin="round" transform="translate(3,4)"/>
  <!-- Outer green (wide) -->
  <path d="M 68,148 C 68,210 68,240 130,260 C 192,280 200,220 200,180
           C 200,140 220,130 260,150 C 300,170 310,220 290,270
           C 270,320 220,330 200,370 C 185,400 230,420 290,440"
    fill="none" stroke="#2DBD8F" stroke-width="48"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Inner channel cutout (sky color — creates double-rail look) -->
  <path d="M 68,148 C 68,210 68,240 130,260 C 192,280 200,220 200,180
           C 200,140 220,130 260,150 C 300,170 310,220 290,270
           C 270,320 220,330 200,370 C 185,400 230,420 290,440"
    fill="none" stroke="#6DD8CA" stroke-width="22"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Highlight top edge -->
  <path d="M 68,148 C 68,210 68,240 130,260 C 192,280 200,220 200,180
           C 200,140 220,130 260,150 C 300,170 310,220 290,270
           C 270,320 220,330 200,370 C 185,400 230,420 290,440"
    fill="none" stroke="#3FD4A6" stroke-width="48"
    stroke-linecap="round" stroke-linejoin="round" opacity=".3"/>

  <!-- Ground layer -->
  <ellipse cx="200" cy="450" rx="240" ry="45" fill="#A8C840"/>
  <rect x="0" y="458" width="400" height="42" fill="#7A9E20"/>
  <ellipse cx="200" cy="458" rx="240" ry="20" fill="#96B830"/>

  <!-- ── OLIVE-GREEN TREES ── -->
  <!-- Tree far left -->
  <g transform="translate(32,370)">
    <rect x="-6" y="-10" width="12" height="55" fill="#8B4513" rx="4"/>
    <ellipse cx="0" cy="-28" rx="34" ry="38" fill="#6B8C20"/>
    <ellipse cx="-16" cy="-42" rx="22" ry="28" fill="#7DA020"/>
    <ellipse cx="16" cy="-42" rx="22" ry="28" fill="#7DA020"/>
    <ellipse cx="0" cy="-55" rx="20" ry="22" fill="#90B825"/>
  </g>
  <!-- Tree mid-left -->
  <g transform="translate(95,385)">
    <rect x="-5" y="-8" width="10" height="44" fill="#8B4513" rx="3"/>
    <ellipse cx="0" cy="-22" rx="28" ry="32" fill="#6B8C20"/>
    <ellipse cx="-13" cy="-34" rx="18" ry="23" fill="#7DA020"/>
    <ellipse cx="13" cy="-34" rx="18" ry="23" fill="#7DA020"/>
    <ellipse cx="0" cy="-45" rx="16" ry="18" fill="#90B825"/>
  </g>
  <!-- Tall tree right (orange trunk like original) -->
  <g transform="translate(352,355)">
    <rect x="-6" y="-15" width="12" height="70" fill="#D97706" rx="4"/>
    <ellipse cx="0" cy="-32" rx="30" ry="35" fill="#6B8C20"/>
    <ellipse cx="-14" cy="-44" rx="20" ry="26" fill="#7DA020"/>
    <ellipse cx="14" cy="-44" rx="20" ry="26" fill="#7DA020"/>
    <ellipse cx="0" cy="-56" rx="18" ry="20" fill="#90B825"/>
  </g>

  <!-- White daisy flowers on ground -->
  <g transform="translate(55,458)">
    <circle cx="0" cy="0" r="4" fill="#FEF08A"/>
    <circle cx="0" cy="-6" r="3.5" fill="#fff"/><circle cx="5" cy="-4" r="3.5" fill="#fff"/>
    <circle cx="5" cy="3" r="3.5" fill="#fff"/><circle cx="0" cy="6" r="3.5" fill="#fff"/>
    <circle cx="-5" cy="3" r="3.5" fill="#fff"/><circle cx="-5" cy="-4" r="3.5" fill="#fff"/>
    <circle cx="0" cy="0" r="4" fill="#FEF08A"/>
  </g>
  <g transform="translate(150,462)">
    <circle cx="0" cy="0" r="3.5" fill="#FEF08A"/>
    <circle cx="0" cy="-5" r="3" fill="#fff"/><circle cx="4" cy="-3" r="3" fill="#fff"/>
    <circle cx="4" cy="3" r="3" fill="#fff"/><circle cx="0" cy="5" r="3" fill="#fff"/>
    <circle cx="-4" cy="3" r="3" fill="#fff"/><circle cx="-4" cy="-3" r="3" fill="#fff"/>
    <circle cx="0" cy="0" r="3.5" fill="#FEF08A"/>
  </g>
  <g transform="translate(230,460)">
    <circle cx="0" cy="0" r="3.5" fill="#FEF08A"/>
    <circle cx="0" cy="-5" r="3" fill="#fff"/><circle cx="4" cy="-3" r="3" fill="#fff"/>
    <circle cx="4" cy="3" r="3" fill="#fff"/><circle cx="0" cy="5" r="3" fill="#fff"/>
    <circle cx="-4" cy="3" r="3" fill="#fff"/><circle cx="-4" cy="-3" r="3" fill="#fff"/>
    <circle cx="0" cy="0" r="3.5" fill="#FEF08A"/>
  </g>

  <!-- ── VOLCANO (smooth rounded mound, lava overflowing) ── -->
  <g transform="translate(300,390)">
    <!-- Lava flow base -->
    <ellipse cx="0" cy="55" rx="52" ry="18" fill="#EA580C" opacity=".5"/>
    <!-- Main volcano mound (rounded, not triangular) -->
    <path d="M -60,60 Q -50,-20 -20,-40 Q 0,-55 20,-40 Q 50,-20 60,60 Z" fill="url(#volcBody)"/>
    <!-- Shading -->
    <path d="M -60,60 Q -50,-20 -20,-40 Q -10,-48 0,-52 Q -20,-30 -30,60 Z" fill="rgba(0,0,0,0.15)"/>
    <!-- Crater top -->
    <ellipse cx="0" cy="-42" rx="22" ry="9" fill="#5C3D1A"/>
    <ellipse cx="0" cy="-43" rx="17" ry="6" fill="#8B4513"/>
    <!-- Lava overflowing from top -->
    <path d="M -12,-42 Q -18,-20 -22,10 Q -20,30 -15,50" fill="none" stroke="url(#lava)" stroke-width="8" stroke-linecap="round"/>
    <path d="M 10,-42 Q 16,-18 18,12 Q 16,32 12,52" fill="none" stroke="url(#lava)" stroke-width="7" stroke-linecap="round"/>
    <path d="M -2,-44 Q -5,-30 -4,0 Q -2,25 0,50" fill="none" stroke="#FBBF24" stroke-width="5" stroke-linecap="round" opacity=".8"/>
    <!-- Lava pool at base -->
    <ellipse cx="-18" cy="52" rx="16" ry="7" fill="#F97316" opacity=".85"/>
    <ellipse cx="14" cy="54" rx="13" ry="6" fill="#EA580C" opacity=".8"/>
  </g>

  <!-- ── PTERODACTYL — top left ── -->
  <g transform="translate(72,130)">
    <!-- Left wing -->
    <path d="M 0,-8 Q -30,-50 -60,-38 Q -38,-20 0,8" fill="#C0392B" opacity=".9"/>
    <!-- Right wing -->
    <path d="M 0,-8 Q 30,-46 62,-35 Q 40,-18 0,8" fill="#E74C3C" opacity=".9"/>
    <!-- Wing membrane lines -->
    <line x1="0" y1="-8" x2="-52" y2="-36" stroke="#A93226" stroke-width="1" opacity=".5"/>
    <line x1="0" y1="-8" x2="55" y2="-33" stroke="#A93226" stroke-width="1" opacity=".5"/>
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="18" ry="11" fill="#C0392B"/>
    <!-- Tail -->
    <path d="M 16,0 Q 28,-4 34,0 Q 28,5 16,2 Z" fill="#E74C3C"/>
    <!-- Neck -->
    <ellipse cx="-14" cy="-10" rx="10" ry="7" fill="#C0392B" transform="rotate(-20,-14,-10)"/>
    <!-- Head -->
    <ellipse cx="-26" cy="-17" rx="12" ry="8" fill="#E74C3C" transform="rotate(-25,-26,-17)"/>
    <!-- Crest on head -->
    <path d="M -22,-24 Q -18,-36 -14,-28" fill="#C0392B"/>
    <!-- Dots on head (like original) -->
    <circle cx="-26" cy="-20" r="2" fill="#F1948A"/>
    <circle cx="-20" cy="-17" r="1.5" fill="#F1948A"/>
    <!-- Beak (yellow, large) -->
    <path d="M -34,-15 Q -50,-12 -52,-8 Q -44,-6 -34,-10 Z" fill="#F1C40F"/>
    <!-- Eye -->
    <circle cx="-28" cy="-18" r="3" fill="#fff"/>
    <circle cx="-27" cy="-18" r="1.5" fill="#1C1917"/>
    <!-- Feet dangling -->
    <line x1="-4" y1="10" x2="-6" y2="20" stroke="#A93226" stroke-width="2" stroke-linecap="round"/>
    <line x1="4" y1="10" x2="6" y2="20" stroke="#A93226" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
</div>
</body>
</html>
