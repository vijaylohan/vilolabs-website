<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Share bar — sample | ViLoLabs</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--char:#1A1108;--cream:#F5F0E8;--gold:#C8963C;--gold2:#E8BC72;--brown3:#A07860;--rule:rgba(200,150,60,.18)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--char);color:var(--cream);padding:2.5rem 1.2rem;line-height:1.6}
.wrap{max-width:680px;margin:0 auto}
.demo-note{text-align:center;color:var(--brown3);font-size:.82rem;margin-bottom:1.5rem}
.demo-note b{color:var(--gold2)}

/* view toggle (demo only — real site auto-detects) */
.vtoggle{display:flex;gap:.5rem;justify-content:center;margin-bottom:2.5rem}
.vtoggle button{padding:.4rem 1rem;border:1.5px solid var(--gold);border-radius:99px;background:transparent;
  color:var(--gold);font-family:'Outfit';font-size:.8rem;cursor:pointer;transition:all .2s}
.vtoggle button.on{background:var(--gold);color:var(--char)}

.fake-article{color:rgba(245,240,232,.55);font-weight:300;font-size:.95rem;margin-bottom:1.5rem}

/* ── SHARE BAR ── */
.share-block{border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);
  padding:1.6rem 0;margin:2rem 0}
.share-hook{font-family:'Cormorant Garamond',serif;font-size:1.35rem;color:var(--gold2);
  margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.share-row{display:flex;flex-wrap:wrap;gap:.6rem;align-items:center}

.sbtn{display:inline-flex;align-items:center;gap:.5rem;padding:.6rem 1.05rem;border-radius:10px;
  font-family:'Outfit';font-size:.9rem;font-weight:600;cursor:pointer;border:none;
  text-decoration:none;transition:transform .15s,box-shadow .15s,opacity .15s;white-space:nowrap}
.sbtn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.35)}
.sbtn svg{width:18px;height:18px;flex-shrink:0}

/* primary native-share button (mobile) — brand gold, biggest */
.sbtn.native{background:linear-gradient(135deg,var(--gold2),var(--gold));color:var(--char);
  font-size:1rem;padding:.8rem 1.6rem;box-shadow:0 6px 18px rgba(200,150,60,.3)}
.sbtn.native svg{width:20px;height:20px}

/* platform colors */
.sbtn.wa{background:#25D366;color:#0a3d20}
.sbtn.tg{background:#229ED9;color:#fff}
.sbtn.fb{background:#1877F2;color:#fff}
.sbtn.pin{background:#E60023;color:#fff}
.sbtn.x {background:#1a1a1a;color:#fff;border:1px solid rgba(255,255,255,.25)}
.sbtn.mail{background:rgba(245,240,232,.08);color:var(--cream);border:1px solid var(--rule)}
.sbtn.copy{background:transparent;color:var(--brown3);border:1px solid var(--rule)}

.hide{display:none!important}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--gold);color:var(--char);padding:.65rem 1.3rem;border-radius:10px;
  font-weight:600;font-size:.85rem;opacity:0;transition:all .3s;z-index:50}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">

<p class="demo-note">Preview — <b>auto-detects</b> the device. Use the toggle to see both versions.</p>

<div class="vtoggle">
  <button id="tMob" class="on" onclick="setView('mobile')">📱 Phone view</button>
  <button id="tDesk" onclick="setView('desktop')">💻 Desktop view</button>
</div>

<p class="fake-article">…the state-wise price gap becomes irrelevant if you drive 15,000+ km a year. (end of article)</p>

<!-- ════════ SHARE BLOCK ════════ -->
<div class="share-block">
  <div class="share-hook">Found this useful? Send it to someone 👇</div>

  <!-- MOBILE: native share (one button = all apps) + WhatsApp -->
  <div class="share-row" id="rowMobile">
    <button class="sbtn native" onclick="nativeShare()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>
      Share
    </button>
    <a class="sbtn wa" href="#" onclick="return waShare()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.7 4.8-1.3A10 10 0 1 0 12 2zm0 18a8 8 0 0 1-4.1-1.1l-.3-.2-2.8.7.8-2.7-.2-.3A8 8 0 1 1 12 20zm4.4-6c-.2-.1-1.4-.7-1.6-.8-.2-.1-.4-.1-.5.1l-.7.9c-.1.2-.3.2-.5.1a6.5 6.5 0 0 1-3.2-2.8c-.1-.2 0-.4.1-.5l.4-.5.2-.4v-.4l-.8-1.8c-.2-.5-.4-.4-.5-.4h-.5a1 1 0 0 0-.7.3 3 3 0 0 0-.9 2.2c0 1.3 1 2.6 1.1 2.8.1.2 1.9 2.9 4.6 4 .6.3 1.1.4 1.5.6.6.2 1.2.2 1.6.1.5-.1 1.4-.6 1.6-1.1.2-.6.2-1 .1-1.1l-.4-.2z"/></svg>
      WhatsApp
    </a>
    <button class="sbtn copy" onclick="copyLink()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l2-2a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-2 2a5 5 0 0 0 7 7l1-1"/></svg>
      Copy
    </button>
  </div>

  <!-- DESKTOP: full button row -->
  <div class="share-row hide" id="rowDesktop">
    <a class="sbtn wa" href="#" onclick="return waShare()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.7 4.8-1.3A10 10 0 1 0 12 2zm0 18a8 8 0 0 1-4.1-1.1l-.3-.2-2.8.7.8-2.7-.2-.3A8 8 0 1 1 12 20zm4.4-6c-.2-.1-1.4-.7-1.6-.8-.2-.1-.4-.1-.5.1l-.7.9c-.1.2-.3.2-.5.1a6.5 6.5 0 0 1-3.2-2.8c-.1-.2 0-.4.1-.5l.4-.5.2-.4v-.4l-.8-1.8c-.2-.5-.4-.4-.5-.4h-.5a1 1 0 0 0-.7.3 3 3 0 0 0-.9 2.2c0 1.3 1 2.6 1.1 2.8.1.2 1.9 2.9 4.6 4 .6.3 1.1.4 1.5.6.6.2 1.2.2 1.6.1.5-.1 1.4-.6 1.6-1.1.2-.6.2-1 .1-1.1l-.4-.2z"/></svg>
      WhatsApp
    </a>
    <a class="sbtn tg" href="#" onclick="return tgShare()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.9 4.3l-3.3 15.6c-.2 1.1-.9 1.4-1.8.9l-5-3.7-2.4 2.3c-.3.3-.5.5-1 .5l.4-5 9.1-8.2c.4-.4-.1-.6-.6-.2L6 13.9l-4.9-1.5c-1.1-.3-1.1-1 .2-1.5l19.1-7.4c.9-.3 1.7.2 1.4 1.3z"/></svg>
      Telegram
    </a>
    <a class="sbtn fb" href="#" onclick="return fbShare()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 9h3V6h-3c-1.7 0-3 1.3-3 3v2H9v3h2v6h3v-6h2.5l.5-3H14V9.5c0-.3.2-.5.5-.5z"/></svg>
      Facebook
    </a>
    <a class="sbtn pin" href="#" onclick="return pinShare()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-3.6 19.3c-.1-.8-.2-2 0-2.9l1.2-5s-.3-.6-.3-1.5c0-1.4.8-2.4 1.8-2.4.9 0 1.3.6 1.3 1.4 0 .9-.5 2.2-.8 3.4-.2.9.5 1.7 1.4 1.7 1.7 0 2.9-2.2 2.9-4.7 0-1.9-1.3-3.4-3.7-3.4a4.2 4.2 0 0 0-4.4 4.2c0 .8.3 1.4.6 1.8l-.3 1c0 .2-.2.3-.4.2-1.1-.5-1.7-2-1.7-3.1 0-2.5 1.9-4.9 5.5-4.9 2.9 0 5.1 2.1 5.1 4.8 0 2.9-1.8 5.2-4.4 5.2-.9 0-1.7-.5-2-1l-.5 2c-.2.8-.7 1.7-1 2.3A10 10 0 1 0 12 2z"/></svg>
      Pinterest
    </a>
    <a class="sbtn x" href="#" onclick="return xShare()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 3h3l-6.6 7.5L21.8 21h-5.9l-4.6-6-5.3 6H3l7-8L2.6 3h6l4.2 5.5L17.5 3zm-1 16h1.6L7.6 4.7H5.9L16.5 19z"/></svg>
      X
    </a>
    <a class="sbtn mail" href="#" onclick="return mailShare()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
      Email
    </a>
    <button class="sbtn copy" onclick="copyLink()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l2-2a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-2 2a5 5 0 0 0 7 7l1-1"/></svg>
      Copy link
    </button>
  </div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
// In the REAL site these come from the page:
const SHARE_URL   = 'https://vilolabs.in/blog/petrol-prices-india-2025';
const SHARE_TITLE = 'Why Delhi pays ₹15 less than Andhra for petrol — interactive comparison';

const u = encodeURIComponent(SHARE_URL);
const t = encodeURIComponent(SHARE_TITLE);

// ── Auto-detect: native share button only where supported (mobile) ──
function autoDetect(){
  if (navigator.share) setView('mobile');
  else setView('desktop');
}
function setView(v){
  document.getElementById('rowMobile').classList.toggle('hide', v!=='mobile');
  document.getElementById('rowDesktop').classList.toggle('hide', v!=='desktop');
  document.getElementById('tMob').classList.toggle('on', v==='mobile');
  document.getElementById('tDesk').classList.toggle('on', v==='desktop');
}

// ── Native share sheet (mobile) ──
async function nativeShare(){
  if (navigator.share){
    try{ await navigator.share({title:SHARE_TITLE, url:SHARE_URL}); }
    catch(e){ /* user cancelled — ignore */ }
  } else {
    showToast('Native share works on phones — try the buttons');
    setView('desktop');
  }
}

// ── Platform intents ──
function waShare(){ open('https://wa.me/?text='+t+'%20'+u); return false; }
function tgShare(){ open('https://t.me/share/url?url='+u+'&text='+t); return false; }
function fbShare(){ open('https://www.facebook.com/sharer/sharer.php?u='+u); return false; }
function pinShare(){ open('https://pinterest.com/pin/create/button/?url='+u+'&description='+t); return false; }
function xShare(){ open('https://twitter.com/intent/tweet?text='+t+'&url='+u); return false; }
function mailShare(){ location.href='mailto:?subject='+t+'&body='+t+'%0A%0A'+u; return false; }
function open(url){ window.open(url,'_blank','noopener,width=600,height=600'); }

function copyLink(){
  navigator.clipboard.writeText(SHARE_URL).then(()=>showToast('Link copied! ✓'));
}
function showToast(m){
  const el=document.getElementById('toast'); el.textContent=m; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

// start in mobile view for the demo so you see the native button first
setView('mobile');
</script>
</body>
</html>
